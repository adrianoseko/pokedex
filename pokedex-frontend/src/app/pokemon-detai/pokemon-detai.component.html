<style>
  .app-header {
    width: 100%;
    display: flex;
    background-color: #333;
    color: #fff;
    padding: 10px 0;
    font-family: "Russo One";
    font-size: large;
  }

  .app-header .nav-link {
    margin: 0 10px;
    text-decoration: none;
    color: #fff;
  }

  .container {
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    margin-top: 5%;
  }

  .card-container {
    width: 20%;
    border: 1px solid #ccc;
    margin-left: 5%;
    border-radius: 10px;
  }

  .pokemon-card {
    font-family: "Russo One";
    margin-left: 5%;
    width: 20%;
    box-shadow: 1%;
    border-radius: 10px;
    margin-bottom: 1rem;
  }

  .card-content {
    margin: 5%;
  }

  .card-content img {
    display: block;
  }

  .card-footer {
    margin: 5%;
  }
</style>

<header class="app-header" role="banner">
  <a href="/" class="nav-link">Pokedex</a>
  <a href="/pokemon-list" class="nav-link">Pesquisar Pokemons</a>
</header>

<main class="container" role="main" aria-live="polite">
  <div class="card-container">
    <p-card *ngIf="pokemon" class="pokemon-card">
      <ng-template pTemplate="header">
        <h2 style="margin: 5%;">{{ pokemon.name }}</h2>
      </ng-template>

      <div class="card-content">
        <img [src]="pokemon.sprites.front_default" [alt]="pokemon.name">
        <p>Height: {{ pokemon.height }}</p>
        <p>Weight: {{ pokemon.weight }}</p>
        <p>Base Experience: {{ pokemon.base_experience }}</p>
      </div>

      <ng-template pTemplate="footer">
        <div class="flex gap-3 mt-1 card-footer">
          <p-button label="Add in My Pokedex" styleClass="w-full" (click)="addInPokeDex()" aria-label="Add in My Pokedex"></p-button>
        </div>
      </ng-template>
    </p-card>
  </div>
</main>
