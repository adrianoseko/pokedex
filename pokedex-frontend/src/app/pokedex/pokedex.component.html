<nav class="pokedex-nav" role="navigation">
  <a href="/pokemon-list" class="pokedex-link">Pesquisar Pokemons</a>
</nav>

<header class="pokedex-header">
  <p>Pokedex</p>
</header>

<main class="pokedex-grid">
  <div *ngFor="let pokemon of pokedex" class="pokedex-card-wrapper">
    <p-card>
      <div class="pokedex-card-content">
        <h2 class="pokemon-name">{{ pokemon.name }}</h2>
        <img [src]="pokemon.image" [alt]="pokemon.name + ' image'" class="pokemon-image">
        <p>Height: {{ pokemon.height }}</p>
        <p>Weight: {{ pokemon.weight }}</p>
        <p>Base Experience: {{ pokemon.base_experience }}</p>
      </div>
    </p-card>
  </div>
</main>

<style>
  /* Layout */
  .pokedex-nav {
    width: 100%;
    display: flex;
    background-color: #333;
    color: #fff;
    padding: 10px 0;
    font-family: 'Russo One', sans-serif;
    font-size: large;
  }

  .pokedex-link {
    margin: 0 10px;
    text-decoration: none;
    color: #fff;
  }

  .pokedex-header {
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    margin-top: 1%;
    font-family: 'Russo One', sans-serif;
    font-size: xx-large;
  }

  .pokedex-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 20px;
    justify-content: center;
  }

  .pokedex-card-wrapper {
    width: 100%;
    border: 1px solid #ccc;
    border-radius: 10px;
    margin-bottom: 20px;
  }

  .pokedex-card-content {
    margin: 5%;
    font-family: 'Russo One', sans-serif;
  }

  .pokemon-name {
    font-size: x-large;
    margin: 0 0 8px 0;
  }

  .pokemon-image {
    width: 100%;
    display: block;
    margin-bottom: 8px;
  }
</style>
